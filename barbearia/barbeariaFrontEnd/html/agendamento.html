<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agendar Serviço</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/agendar.css">

</head>

<body>

<header class="header">

<span class="voltar" onclick="voltar()">⬅</span>

<h3>Agendar Serviço</h3>

</header>

<div class="container">

<h2>Agendar Serviço</h2>

<form id="formAgendamento" class="form-agendamento">

    <label for="servico">Serviço</label>
    <input type="text" id="servico" readonly>

    <label for="nomeCliente">Nome</label>
    <input type="text" id="nomeCliente" required placeholder="Seu nome completo">

    <label for="contato">Contato</label>
    <input type="text" id="contato" required placeholder="(00) 00000-0000">

    <label for="dataAgendada">Data do Agendamento</label>
    <input type="date" id="dataAgendada" required>

    <label>Horários Disponíveis</label>
    <div id="container-horarios" class="grid-horarios">
        <p style="color: #666; font-size: 0.9rem;">Selecione uma data para ver os horários</p>
    </div>

    <button type="button" onclick="enviarAgendamento()">Confirmar Agendamento</button>

</form>

<div id="modalAviso" class="modal">

  <div class="modal-content">

    <p id="mensagemModal"></p>

    <button onclick="fecharModal()">OK</button>

  </div>

</div>

<script src="../script.js"></script>




</body>
</html>
